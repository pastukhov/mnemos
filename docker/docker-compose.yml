services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mnemos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - mnemos-qdrant-data:/qdrant/storage

  mnemos:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "${MNEMOS_PORT:-8000}:8000"
    restart: unless-stopped

  mnemos-mcp:
    profiles:
      - mcp-http
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      MNEMOS_URL: http://mnemos:8000
      MCP_SERVER_TRANSPORT: streamable-http
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 9000
    command:
      - mnemos
      - mcp-server
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "9000"
    depends_on:
      mnemos:
        condition: service_started
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  mnemos-postgres-data:
  mnemos-qdrant-data:
