name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e '.[dev]'
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest -q

  governance:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Conventional Commits in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          COMMITS=$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "$COMMITS" ]; then
            echo "No commits to validate"
            exit 0
          fi
          for SHA in $COMMITS; do
            MSG=$(git log -1 --format=%B "$SHA")
            ./scripts/validate_conventional_commit.sh "$MSG"
          done
